name: sync PR checks and auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  sync-pr-ci:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'sync/gloo-gateway-clientset' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Compile-check exported packages
        shell: bash
        run: |
          set -euo pipefail
          go test ./api/... ./clientset/... -run '^$'

  merge-sync-pr:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'sync/gloo-gateway-clientset' &&
      !github.event.pull_request.draft &&
      vars.SYNC_APP_ID != '' &&
      vars.SYNC_PR_AUTHOR_LOGIN != '' &&
      github.event.pull_request.user.login == vars.SYNC_PR_AUTHOR_LOGIN
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token (sync app)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Wait for sync PR checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          SELF_CHECK="merge-sync-pr"
          MAX_ATTEMPTS=180
          SLEEP_SECONDS=20
          CHECKS_READY=false
          EXPECTED_CHECKS=(
            "sync-pr-ci"
            "validate"
            "validate-examples"
            "validate-examples-e2e"
          )

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            PR_JSON="$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json state,isDraft,statusCheckRollup)"
            PR_STATE="$(jq -r '.state' <<<"${PR_JSON}")"
            PR_DRAFT="$(jq -r '.isDraft' <<<"${PR_JSON}")"

            if [[ "${PR_STATE}" != "OPEN" ]]; then
              echo "PR #${PR_NUMBER} is no longer open; nothing to merge"
              exit 0
            fi
            if [[ "${PR_DRAFT}" == "true" ]]; then
              echo "PR #${PR_NUMBER} is draft; nothing to merge"
              exit 0
            fi

            FAILING_CHECKS="$(jq -r --arg self "${SELF_CHECK}" '
              .statusCheckRollup[]
              | select(.name != $self)
              | select(
                  (. __typename == "CheckRun" and .status == "COMPLETED" and (.conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != "NEUTRAL"))
                  or
                  (. __typename == "StatusContext" and (.state == "FAILURE" or .state == "ERROR"))
                )
              | "\(.name):\(
                  if .__typename == "CheckRun" then .conclusion else .state end
                )"
            ' <<<"${PR_JSON}")"

            if [[ -n "${FAILING_CHECKS}" ]]; then
              echo "Failing sync PR checks detected:"
              echo "${FAILING_CHECKS}"
              exit 1
            fi

            MISSING_CHECKS=()
            PENDING_CHECKS=()

            for check_name in "${EXPECTED_CHECKS[@]}"; do
              PRESENT_COUNT="$(jq -r --arg name "${check_name}" '[.statusCheckRollup[] | select(.name == $name)] | length' <<<"${PR_JSON}")"
              SUCCESS_COUNT="$(jq -r --arg name "${check_name}" '
                [
                  .statusCheckRollup[]
                  | select(.name == $name)
                  | select(
                      (. __typename == "CheckRun" and .status == "COMPLETED" and (.conclusion == "SUCCESS" or .conclusion == "SKIPPED" or .conclusion == "NEUTRAL"))
                      or
                      (. __typename == "StatusContext" and .state == "SUCCESS")
                    )
                ] | length
              ' <<<"${PR_JSON}")"
              PENDING_COUNT="$(jq -r --arg name "${check_name}" '
                [
                  .statusCheckRollup[]
                  | select(.name == $name)
                  | select(
                      (. __typename == "CheckRun" and .status != "COMPLETED")
                      or
                      (. __typename == "StatusContext" and (.state == "PENDING" or .state == "EXPECTED"))
                    )
                ] | length
              ' <<<"${PR_JSON}")"

              if [[ "${PRESENT_COUNT}" == "0" ]]; then
                MISSING_CHECKS+=("${check_name}")
              elif [[ "${SUCCESS_COUNT}" != "0" ]]; then
                continue
              elif [[ "${PENDING_COUNT}" != "0" ]]; then
                PENDING_CHECKS+=("${check_name}")
              else
                echo "Check ${check_name} did not reach a successful terminal state"
                exit 1
              fi
            done

            if [[ "${#MISSING_CHECKS[@]}" -eq 0 && "${#PENDING_CHECKS[@]}" -eq 0 ]]; then
              echo "All expected sync PR checks completed successfully"
              CHECKS_READY=true
              break
            fi

            echo "Waiting for sync PR checks to complete (attempt ${attempt}/${MAX_ATTEMPTS})"
            if [[ "${#MISSING_CHECKS[@]}" -gt 0 ]]; then
              echo "Missing checks: ${MISSING_CHECKS[*]}"
            fi
            if [[ "${#PENDING_CHECKS[@]}" -gt 0 ]]; then
              echo "Pending checks: ${PENDING_CHECKS[*]}"
            fi
            sleep "${SLEEP_SECONDS}"
          done

          if [[ "${CHECKS_READY}" != "true" ]]; then
            echo "Timed out waiting for sync PR checks to complete"
            exit 1
          fi

      - name: Merge trusted sync PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr merge "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --squash \
            --match-head-commit "${{ github.event.pull_request.head.sha }}" \
            --delete-branch=false
