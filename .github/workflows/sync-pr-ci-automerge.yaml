name: sync PR checks and auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  sync-pr-ci:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'sync/gloo-gateway-clientset' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Compile-check exported packages
        shell: bash
        run: |
          set -euo pipefail
          go test ./api/... ./clientset/... -run '^$'

  merge-sync-pr:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'sync/gloo-gateway-clientset' &&
      !github.event.pull_request.draft &&
      vars.SYNC_APP_ID != '' &&
      vars.SYNC_PR_AUTHOR_LOGIN != '' &&
      github.event.pull_request.user.login == vars.SYNC_PR_AUTHOR_LOGIN
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Create GitHub App token (sync app)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Merge trusted sync PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_CHECKS: sync-pr-ci validate validate-examples validate-examples-e2e
          SELF_CHECK_NAME: merge-sync-pr
        shell: bash
        run: |
          ./hack/merge-sync-pr.sh

  notify-sync-pr-failure:
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'sync/gloo-gateway-clientset' &&
      !github.event.pull_request.draft &&
      needs.merge-sync-pr.result != 'success'
    needs:
      - merge-sync-pr
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_NOTIFY_MENTION: ${{ vars.SLACK_NOTIFY_MENTION }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_RESULT: ${{ needs.merge-sync-pr.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification"
            exit 0
          fi
          mention="${SLACK_NOTIFY_MENTION:-@Daneyon Hansen}"
          export SLACK_MESSAGE="${mention} main sync PR #${PR_NUMBER} did not auto-merge.

          merge-sync-pr=${MERGE_RESULT}
          PR: ${PR_URL}
          Run: ${RUN_URL}"
          ./hack/send-slack-notification.sh
