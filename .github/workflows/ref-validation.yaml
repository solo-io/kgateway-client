name: Ref Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      refs:
        description: "Space-separated refs to test (default: main)"
        required: false
        type: string

concurrency:
  group: ref-validation-${{ github.event_name == 'workflow_dispatch' && inputs.refs || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags and main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git fetch --force origin main:refs/remotes/origin/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve refs to test
        id: resolve-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.refs }}" ]]; then
              echo "refs=${{ inputs.refs }}" >> "$GITHUB_OUTPUT"
            else
              echo "refs=main" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            latest_tag="$(git for-each-ref --sort=-version:refname --format='%(refname:short)' refs/tags | head -n 1)"
            if [[ -n "${latest_tag}" ]]; then
              echo "refs=${latest_tag}" >> "$GITHUB_OUTPUT"
            else
              echo "refs=main" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "refs=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ref validation suite
        shell: bash
        run: |
          set -euo pipefail
          refs="${{ steps.resolve-refs.outputs.refs }}"
          if [[ -n "${refs}" ]]; then
            read -r -a ref_array <<< "${refs}"
            ./hack/test-ref-matrix.sh "${ref_array[@]}"
          else
            ./hack/test-ref-matrix.sh
          fi

  validate-examples:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags and main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git fetch --force origin main:refs/remotes/origin/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve refs to test
        id: resolve-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.refs }}" ]]; then
              echo "refs=${{ inputs.refs }}" >> "$GITHUB_OUTPUT"
            else
              echo "refs=main" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "refs=" >> "$GITHUB_OUTPUT"
          else
            echo "refs=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Run example validation suite
        shell: bash
        run: |
          set -euo pipefail
          refs="${{ steps.resolve-refs.outputs.refs }}"
          if [[ -n "${refs}" ]]; then
            read -r -a ref_array <<< "${refs}"
            ./hack/test-example-matrix.sh "${ref_array[@]}"
          else
            ./hack/test-example-matrix.sh
          fi

  notify-tag-validation-failure:
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      startsWith(inputs.refs, 'v') &&
      (needs.validate.result == 'failure' || needs.validate-examples.result == 'failure')
    needs:
      - validate
      - validate-examples
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_NOTIFY_MENTION: ${{ vars.SLACK_NOTIFY_MENTION }}
          TAG_REF: ${{ inputs.refs }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          VALIDATE_EXAMPLES_RESULT: ${{ needs.validate-examples.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification"
            exit 0
          fi
          mention="${SLACK_NOTIFY_MENTION:-@Daneyon Hansen}"
          export SLACK_MESSAGE="${mention} tag sync validation failed for ${TAG_REF}.

          validate=${VALIDATE_RESULT}
          validate-examples=${VALIDATE_EXAMPLES_RESULT}
          Run: ${RUN_URL}"
          ./hack/send-slack-notification.sh
